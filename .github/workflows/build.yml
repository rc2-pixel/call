name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # 手動実行も可能

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: JDK 17 をセットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Gradle Wrapper をセットアップ
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: デバッグ APK をビルド
        run: gradle assembleDebug --stacktrace

      - name: APK をアップロード（アーティファクト）
        uses: actions/upload-artifact@v4
        with:
          name: CallHistoryApp-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
